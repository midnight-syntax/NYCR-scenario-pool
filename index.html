<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NYC Creative Room</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family: Inter, sans-serif;
      background:
        radial-gradient(circle at 10% 20%, rgba(90,180,255,.4), transparent 60%),
        radial-gradient(circle at 90% 10%, rgba(255,150,200,.4), transparent 60%),
        radial-gradient(circle at 50% 90%, rgba(255,220,120,.4), transparent 60%),
        #fdf9ff;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .card{
      background:white;
      border-radius:24px;
      padding:40px;
      width:90%;
      max-width:600px;
      box-shadow: 
      0 30px 60px rgba(0,0,0,.10),
      0 0 0 1px rgba(255,255,255,.4) inset;
      border:2px solid rgba(0,0,0,.1);
    }

    h1{
      font-family:Caveat, cursive;
      font-size:48px;
      margin:0 0 20px;
      text-align:center;
      letter-spacing: 1px;
    }
    
    textarea {
      transition: all 0.2s ease;
    }
    
    textarea:focus {
      box-shadow: 0 0 0 4px rgba(138,108,255,.15);
      border-color: rgba(138,108,255,.5);
    }
    textarea{
      width:100%;
      min-height:120px;
      border-radius:16px;
      border:2px solid rgba(0,0,0,.1);
      padding:16px;
      font-size:15px;
      resize:vertical;
    }

   button {
  margin-top:16px;
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  background: linear-gradient(90deg,#8a6cff,#a78bfa);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition: all .2s ease;
}

button:hover{
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(138,108,255,.3);
}

    .status{
      text-align:center;
      margin-top:12px;
      font-size:14px;
      color:#555;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Scenario Pool ✨</h1>

    <textarea id="scenario" placeholder="Type a scenario you'd like us to discuss..."></textarea>

    <button onclick="submitForm()">Submit</button>

    <div class="status" id="status"></div>
  </div>

<script>
  const SUPABASE_URL = "https://cncwxkmzoiccoeddlzpt.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_sqIbRtj7ppvUi5ElLpQWhg_oQLSgM0w";

  async function submitForm(){
    const scenario = document.getElementById("scenario").value.trim();
    const status = document.getElementById("status");

    if(!scenario){
      status.innerText = "Please enter something first.";
      return;
    }

    status.innerText = "Submitting…";

    const res = await fetch(`${SUPABASE_URL}/rest/v1/submissions`, {
      method:"POST",
      headers:{
        "apikey": SUPABASE_ANON_KEY,
        "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        "Content-Type":"application/json",
        "Prefer":"return=minimal"
      },
      body: JSON.stringify({
        scenario: scenario,
        week: new Date().toISOString().slice(0,10)
      })
    });

    if(res.ok){
      document.getElementById("scenario").value="";
      status.innerText="Submitted ✨ thank you.";
    } else {
      status.innerText="Something went wrong.";
    }
  }
</script>

</body>
</html>
