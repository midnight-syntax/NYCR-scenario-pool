<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>NYC Creative Room — Scenario Pool</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family: Nunito, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(900px 500px at 10% 10%, rgba(72,180,255,.35), transparent 60%),
        radial-gradient(800px 520px at 85% 18%, rgba(255,170,210,.38), transparent 60%),
        radial-gradient(760px 520px at 30% 92%, rgba(255,210,120,.40), transparent 62%),
        radial-gradient(900px 520px at 90% 85%, rgba(155,110,255,.30), transparent 60%),
        #faf7ff;
      min-height:100vh;
    }
    .wrap{ max-width: 900px; margin: 0 auto; padding: 44px 16px 64px; }
    .hero{ text-align:center; margin-bottom: 14px; }
    .tag{
      display:inline-block; padding: 8px 14px; border: 2px solid rgba(0,0,0,.18);
      border-radius: 999px; background: rgba(255,255,255,.55);
      letter-spacing: .6px; font-size: 12px; font-weight: 800;
    }
    h1{
      margin: 16px 0 8px; font-family: Caveat, cursive; font-size: 54px; line-height: 1;
      transform: rotate(-1deg);
    }
    .sub{ margin:0 auto; max-width: 650px; color: rgba(0,0,0,.65); }
    .card{
      border: 2px solid rgba(0,0,0,.14);
      background: rgba(255,255,255,.78);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,.12);
      backdrop-filter: blur(6px);
    }
    iframe{ width:100%; border:0; min-height: 900px; }
    .footer{
      text-align:center; margin-top: 16px; color: rgba(0,0,0,.55);
      font-family: Caveat, cursive; font-size: 22px;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <header class="hero">
      <div class="tag">NYC CREATIVE ROOM</div>
      <h1>Scenario Pool ✨</h1>
      <p class="sub">Drop a scenario for our weekly discussion picks. Softly, slowly — for the artists still becoming.</p>
    </header>

    <section class="card">
     <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd1K3gU3e_QeAAmVeZD-nHi0-8HGVm-1swkbo0_c3JOQwENEg/viewform?embedded=true" width="640" height="380" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </section>

    <footer class="footer">thank you for shaping the room 💜</footer>
  </main>
</body>
</html>
